<!DOCTYPE html>
<html lang="en"
 xmlns:th="http://www.thymeleaf.org">
	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link rel="stylesheet" href="/register.css">
</head>
<body>

    <div class="container">
        <form class="register-form" action="/register" method="post" 
		th:object ="${user}">
			
            <h2>User Registration</h2>

            <div class="input-group">
                <label for="name">Full Name</label>
                <input th:field ="*{userName}" type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input th:field ="*{email}" type="email" id="email" name="email" placeholder="Enter your email" required>
			</div>

            <div class="input-group">
                <label for="password">Password</label>
                <input th:field ="*{userPassword}" type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <div class="input-group">
                <label for="role">Role</label>
                <input th:field="*{role}" type="text" id="role" name="role" placeholder="Add role" required>
            </div>

            <button type="submit">Register</button>

            <p class="login-link">
                Already have an account? <a href="/userLogin">Login</a>
            </p>
			<div class="error-msg">
				<p class ="error" th:if="${errorMessage}" th:text="${errorMessage}"></p>
			</div>
		
        </form>
    </div>

</body>
</html>
